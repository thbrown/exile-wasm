<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blades of Exile - WebAssembly Port</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #4CAF50;
            margin-bottom: 10px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        #canvas {
            border: 2px solid #4CAF50;
            background-color: #000000;
            display: block;
            margin: 20px auto;
        }

        #output {
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        #status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
        }

        #status.loading {
            background-color: #ff9800;
            color: #000;
        }

        #status.ready {
            background-color: #4CAF50;
            color: #fff;
        }

        #status.error {
            background-color: #f44336;
            color: #fff;
        }

        .info {
            background-color: #2a2a2a;
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
            border-left: 4px solid #4CAF50;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Blades of Exile - WebAssembly Port</h1>

        <div id="status" class="loading">Loading...</div>

        <div class="info">
            <h3>Development Build - Phase 1</h3>
            <p>This is a minimal test build to verify the WebAssembly compilation pipeline.</p>
            <p>Check the console output below for initialization messages.</p>
        </div>

        <canvas id="canvas" width="960" height="640"></canvas>

        <h3>Console Output:</h3>
        <div id="output"></div>
    </div>

    <!-- Canvas helper functions -->
    <script src="canvas_helpers.js"></script>

    <script>
        // Redirect console.log to our output div
        const outputDiv = document.getElementById('output');
        const statusDiv = document.getElementById('status');

        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            outputDiv.textContent += args.join(' ') + '\n';
            outputDiv.scrollTop = outputDiv.scrollHeight;
        };

        const originalError = console.error;
        console.error = function(...args) {
            originalError.apply(console, args);
            outputDiv.textContent += 'ERROR: ' + args.join(' ') + '\n';
            outputDiv.scrollTop = outputDiv.scrollHeight;
            statusDiv.textContent = 'Error loading WASM module';
            statusDiv.className = 'error';
        };

        // Module configuration
        var Module = {
            canvas: document.getElementById('canvas'),
            print: function(text) {
                console.log(text);
            },
            printErr: function(text) {
                console.error(text);
            },
            onRuntimeInitialized: function() {
                console.log('WebAssembly runtime initialized successfully!');
                statusDiv.textContent = 'Ready';
                statusDiv.className = 'ready';
            },
            onAbort: function(what) {
                statusDiv.textContent = 'WASM module aborted';
                statusDiv.className = 'error';
            }
        };

        console.log('Loading Blades of Exile WASM module...');
    </script>

    <!-- The Emscripten-generated JavaScript will be loaded here -->
    <script src="boe.js"></script>
</body>
</html>
